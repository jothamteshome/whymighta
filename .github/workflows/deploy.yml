name: Deploy whymighta to EC2 via AWS SSM

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-region: us-east-1

    - name: Update SSM Parameters
      run: |
        aws ssm put-parameter --name "/whymighta/db/username" --value "${{ secrets.DB_USERNAME }}" --type "String" --overwrite
        aws ssm put-parameter --name "/whymighta/db/password" --value "${{ secrets.DB_PASSWORD }}" --type "SecureString" --overwrite
        aws ssm put-parameter --name "/whymighta/db/host" --value "${{ secrets.DB_HOST }}" --type "String" --overwrite
        aws ssm put-parameter --name "/whymighta/db/port" --value "${{ secrets.DB_PORT }}" --type "String" --overwrite
        aws ssm put-parameter --name "/whymighta/db/database" --value "${{ secrets.DB_DATABASE }}" --type "String" --overwrite
        aws ssm put-parameter --name "/whymighta/api/chatgpt/url" --value "${{ secrets.AWS_CHATGPT_API_URL }}" --type "String" --overwrite
        aws ssm put-parameter --name "/whymighta/api/chatgpt/key" --value "${{ secrets.AWS_CHATGPT_API_KEY }}" --type "SecureString" --overwrite
        aws ssm put-parameter --name "/whymighta/api/weather/key" --value "${{ secrets.WEATHER_API_KEY }}" --type "SecureString" --overwrite
        aws ssm put-parameter --name "/whymighta/discord/token" --value "${{ secrets.DISCORD_TOKEN }}" --type "SecureString" --overwrite

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ghcr.io/jothamteshome/whymighta:latest

    - name: Deploy on EC2
      run: |
        command_id=$(aws ssm send-command \
          --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --parameters '{"commands":[
            "source /etc/profile.d/init-env.sh",
            "cd /opt/infrastructure/cloud/perpetual-app-host",
            "git pull origin main",
            "docker compose pull whymighta",
            "docker compose up -d whymighta"
          ]}' \
          --comment "Deploy whymighta" \
          --query "Command.CommandId" \
          --output text)

        aws ssm wait command-executed \
          --command-id "$command_id" \
          --instance-id ${{ secrets.EC2_INSTANCE_ID }}

        aws ssm get-command-invocation \
          --command-id "$command_id" \
          --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
          --query "StandardOutputContent" \
          --output text
